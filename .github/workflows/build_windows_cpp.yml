name: Windows C++

on:
  workflow_call:

jobs:
  cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
        - { os: "windows-2025", msvc-toolset: "v141", cxx-standard: "11", build-type: "Release" }
        - { os: "windows-2025", msvc-toolset: "v141", cxx-standard: "11", build-type: "Debug" }

        - { os: "windows-2025", mingw-version: "7.5.0", cxx-standard: "11", build-type: "Release" }
        - { os: "windows-2025", mingw-version: "7.5.0", cxx-standard: "11", build-type: "Debug" }

        - { os: "windows-2025", msvc-toolset: "v142", cxx-standard: "11", build-type: "Release" }
        - { os: "windows-2025", msvc-toolset: "v142", cxx-standard: "11", build-type: "Debug" }

        - { os: "windows-2025", mingw-version: "9.4.0", cxx-standard: "11", build-type: "Release" }
        - { os: "windows-2025", mingw-version: "9.4.0", cxx-standard: "11", build-type: "Debug" }

        - { os: "windows-2025", msvc-toolset: "v142", cxx-standard: "17", build-type: "Release" }
        - { os: "windows-2025", msvc-toolset: "v142", cxx-standard: "17", build-type: "Debug" }

        - { os: "windows-2025", mingw-version: "9.4.0", cxx-standard: "17", build-type: "Release" }
        - { os: "windows-2025", mingw-version: "9.4.0", cxx-standard: "17", build-type: "Debug" }

    runs-on: ${{matrix.os}}
    name: "\
      ${{matrix.os}}-\
      ${{ matrix.msvc-toolset && format('msvc-{0}', matrix.msvc-toolset)
          || format('mingw{0}', matrix.mingw-version) }}-\
      c++${{matrix.cxx-standard}}-${{matrix.build-type}}"

    steps:
    - name: "Set up environment"
      env:
        CMAKE_GENERATOR: "Visual Studio 18 2026"
        VS_VERSION: "18"
      shell: cmd
      run: |
        if not "${{matrix.msvc-toolset}}"=="" (
          (echo MSVC_CMAKE_GENERATOR=%CMAKE_GENERATOR%) >> "%GITHUB_ENV%"
          (echo MSVC_CMAKE_TOOLSET=${{matrix.msvc-toolset}}) >> "%GITHUB_ENV"
          (echo CMAKE_BUILD_PARALLEL_LEVEL=%NUMBER_OF_PROCESSORS%) >> "%GITHUB_ENV%"
          (echo PACKAGE=windows64-msvc) >> "%GITHUB_ENV%"
          dir "C:\Program Files (x86)\Microsoft Visual Studio\Installer"
          echo dir2nd
          dir "C:\Program Files\Microsoft Visual Studio\${VS_VERSION}"
          rem v141, v142 toolsets are not installed by default
          if "${{matrix.msvc-toolset}}"=="v141" (
            echo Running vs_installer.exe...
            "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --add Microsoft.VisualStudio.Component.VC.v141.x86.x64 --nocache --passive --norestart --installPath "C:\Program Files\Microsoft Visual Studio\${VS_VERSION}\Enterprise" 2>&1
          ) else if "${{matrix.msvc-toolset}}"=="v142" (
            echo Running vs_installer.exe...
            "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --add Microsoft.VisualStudio.ComponentGroup.VC.Tools.142.x86.x64 --nocache --passive --norestart --installPath "C:\Program Files\Microsoft Visual Studio\${VS_VERSION}\Enterprise" 2>&1
          )
        )

        if not "${{matrix.mingw-version}}"=="" (
          echo (CMAKE_BUILD_OPTIONS=-j%NUMBER_OF_PROCESSORS%) >> "%GITHUB_ENV%"
          echo (MINGW64_TOOLCHAIN_ROOT=/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64) >> "%GITHUB_ENV%"
          echo (PACKAGE=windows64-mingw) >> "%GITHUB_ENV%"
        )

        echo (CLANG_FORMAT_BIN=clang-format) >> "%GITHUB_ENV%"
        echo (CMAKE_EXTRA_ARGS=-DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_CXX_STANDARD=${{matrix.cxx-standard}} -DZSERIO_ENABLE_WERROR=1) >> "%GITHUB_ENV%"

    - name: Install dependencies
      shell: cmd # need cmd with admin rights to install app links
      run: |
        winget install wget --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install doxygen --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install graphviz --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install gnuwin32.zip --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install gnuwin32.unzip --accept-source-agreements --accept-package-agreements --disable-interactivity
        dir "%LOCALAPPDATA%/Microsoft/WinGet/Links"
        echo %LOCALAPPDATA%/Microsoft/WinGet/Links>>%GITHUB_PATH%
        dir "C:\Program Files (x86)\GnuWin32\bin"
        echo C:\Program Files (x86)\GnuWin32\bin>>%GITHUB_PATH%

    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "8"

    - name: Install mingw ${{matrix.mingw-version}} compiler
      shell: bash
      if: ${{ matrix.mingw-version != '' }}
      continue-on-error: true
      run: |
        for i in {1..3}; do
          if [ $i -ne 1 ]; then sleep 10; fi
          choco install mingw --version ${{matrix.mingw-version}} || continue
          break
        done

    - name: Install clang format
      shell: bash
      continue-on-error: true
      run: |
        for i in {1..3}; do
          if [ $i -ne 1 ]; then sleep 10; fi
          choco install llvm --version=14.0.0 --allow-downgrade || continue
          break
        done

    - name: "Convert environment variables to POSIX paths"
      shell: bash
      run: |
        echo "ANT=/${ANT_HOME}/bin/ant" | sed -e 's/\\/\//g' -e 's/://' >> ${GITHUB_ENV}
        echo "JAVA_HOME=/${JAVA_HOME}" | sed -e 's/\\/\//g' -e 's/://' >> ${GITHUB_ENV}

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download Zserio release artifact
      uses: actions/download-artifact@v4
      with:
        name: zserio-bin-java8

    - name: Build Zserio C++ runtime
      shell: bash
      run: |
        scripts/build.sh cpp_rt-${PACKAGE}

    - name: Pack Zserio C++ runtime release
      shell: bash
      run: |
        scripts/release.sh -p runtime_libs

    - name: Run Zserio tests
      shell: bash
      run: |
        scripts/test.sh cpp-${PACKAGE}

    - name: Run Zserio tests with extra arguments
      shell: bash
      run: |
        export ZSERIO_EXTRA_ARGS="-withTypeInfoCode -withReflectionCode -withCodeComments -setCppAllocator polymorphic -withParsingInfoCode"
        scripts/test.sh -p -i arguments/without_writer_code -i arguments/with_setters_code cpp-${PACKAGE}

        if [[ "${{matrix.msvc-toolset}}" != "" && "${{matrix.build-type}}" == "Debug" ]] ; then
          # MSVC Debug build fails, https://github.com/ndsev/zserio/issues/589
          EXCLUDE_SET_CPP_ALLOCATOR="-x arguments/set_cpp_allocator"
        fi

        export ZSERIO_EXTRA_ARGS="${ZSERIO_EXTRA_ARGS} -withValidationCode -withRangeCheckCode"
        scripts/test.sh -p -x arguments/without_writer_code -x arguments/with_setters_code ${EXCLUDE_SET_CPP_ALLOCATOR} cpp-${PACKAGE}

    - name: Run Zserio integration tests for repeated generation
      shell: bash
      run: |
        scripts/test_gen.sh cpp-${PACKAGE}

    - name: Run Zserio API compatibility checks
      # MSVC Debug build fails, https://github.com/ndsev/zserio/issues/589
      # MinGW Debug/Release build fails because of long paths
      if: ${{ matrix.mingw-version == '' && (matrix.msvc-toolset == '' || matrix.build-type == 'Release') }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      run: |
        scripts/test_compat_api.sh cpp-${PACKAGE}

    - name: Run Zserio performance tests
      shell: bash
      run: |
        scripts/test_perf.sh cpp-${PACKAGE} \
            --source-dir test/data/others/gif/zs --source gif.zs \
            --blob-name gif.GifFile --blob-file test/data/others/gif/data/1pix.gif \
            --num-iterations 1000 --test-config READ_WRITE

    - name: Run Zserio benchmarks
      shell: bash
      run: |
        scripts/benchmark.sh cpp-${PACKAGE} --num-iterations 1

    - name: Archive Zserio C++ runtime artifacts
      uses: actions/upload-artifact@v4
      # we want this artifact only once since it contains only sources
      if: ${{ matrix.msvc-toolset == 'v141' && matrix.cxx-standard && matrix.build-type == 'Release' }}
      with:
        name: "zserio-runtime-cpp"
        path: release-*/*runtime-libs*

    - name: Archive Zseiro C++ build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: "\
          zserio-build-${{matrix.os}}-\
          ${{ matrix.msvc-toolset && format('msvc-{0}', matrix.msvc-toolset)
              || format('mingw{0}', matrix.mingw-version)}}-\
          cxx${{matrix.cxx-standard}}-${{matrix.build-type}}"
        path: |
          build/runtime_libs/cpp/**/runtime/*.a
          build/runtime_libs/cpp/**/runtime/*.lib
