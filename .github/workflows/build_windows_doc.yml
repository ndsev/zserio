name: Windows Doc

on:
  workflow_call:

jobs:
  doc:
    strategy:
      fail-fast: false
      matrix:
        include:
        - { os: "windows-2025" }

    runs-on: ${{matrix.os}}
    name: ${{matrix.os}}

    steps:
    - name: "Set up environment"
      shell: bash
      run: |
        echo "NU_HTML_VALIDATOR=${RUNNER_WORKSPACE}/vnu-20.6.30/vnu.jar" >> ${GITHUB_ENV}

    - name: Install dependencies
      shell: cmd # need cmd with admin rights to install app links
      run: |
        winget install wget --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install graphviz --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install gnuwin32.zip --accept-source-agreements --accept-package-agreements --disable-interactivity
        winget install gnuwin32.unzip --accept-source-agreements --accept-package-agreements --disable-interactivity
        dir "%LOCALAPPDATA%/Microsoft/WinGet/Links"
        echo %LOCALAPPDATA%/Microsoft/WinGet/Links>>%GITHUB_PATH%
        dir "C:\Program Files (x86)\GnuWin32\bin"
        echo C:\Program Files (x86)\GnuWin32\bin>>%GITHUB_PATH%

    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "8"

    - name: Install specific version of HTML validator (v.Nu)
      shell: bash
      continue-on-error: true
      run: |
        for i in {1..3}; do
          if [ $i -ne 1 ]; then sleep 10; fi
          wget -P "${RUNNER_WORKSPACE}" \
            https://github.com/validator/validator/releases/download/20.6.30/vnu.jar_20.6.30.zip || continue
          break
        done
        unzip "${RUNNER_WORKSPACE}\vnu.jar_20.6.30.zip" -d "${RUNNER_WORKSPACE}"
        mv "${RUNNER_WORKSPACE}\dist" "${RUNNER_WORKSPACE}\vnu-20.6.30"

    - name: "Convert environment variables to POSIX paths"
      shell: bash
      run: |
        echo "ANT=/${ANT_HOME}/bin/ant" | sed -e 's/\\/\//g' -e 's/://' >> ${GITHUB_ENV}
        echo "JAVA_HOME=/${JAVA_HOME}" | sed -e 's/\\/\//g' -e 's/://' >> ${GITHUB_ENV}
        echo "NU_HTML_VALIDATOR=/${NU_HTML_VALIDATOR}" | sed -e 's/\\/\//g' -e 's/://' >> ${GITHUB_ENV}

    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download Zserio release artifact
      uses: actions/download-artifact@v4
      with:
        name: zserio-bin-java8

    - name: Run Zserio tests
      shell: bash
      run: |
        scripts/test.sh doc

    - name: Run Zserio tests with extra arguments
      shell: bash
      run: |
        export ZSERIO_EXTRA_ARGS="-withTypeInfoCode -withCodeComments"
        scripts/test.sh -p -i arguments/without_writer_code doc

        export ZSERIO_EXTRA_ARGS="${ZSERIO_EXTRA_ARGS} -withValidationCode -withRangeCheckCode"
        scripts/test.sh -p -x arguments/without_writer_code doc

    - name: Run Zserio integration tests for repeated generation
      shell: bash
      run: |
        scripts/test_gen.sh doc
